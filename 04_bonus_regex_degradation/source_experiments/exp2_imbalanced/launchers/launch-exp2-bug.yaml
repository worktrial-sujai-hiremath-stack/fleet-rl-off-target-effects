# Managed-job YAML for Exp 2 — Imbalanced Copy-the-Helper RL (buggy-code side-effects)
# Qwen3-1.7B-Base. 3 arms sequential (control, clean_clamp, buggy_clamp). 200 GRPO steps each.
#
# Usage (managed job — auto-recovers from spot preemption):
#   sky jobs launch -n fleet-bug-exp2 -y \
#     /path/to/launch-exp2-bug.yaml \
#     --env WANDB_API_KEY --env AWS_ACCESS_KEY_ID --env AWS_SECRET_ACCESS_KEY \
#     --env OPENROUTER_API_KEY
#
# Multi-cloud any_of fallback: AWS spot H200 first (only cloud currently enabled on
# the jobs controller); GCP spot H200 next (preferred when GCP auth is valid).
# RunPod/Lambda/Nebius/Vast as tertiary fallbacks.

name: fleet-bug-exp2

resources:
  disk_size: 500
  ports: 6479
  any_of:
    - accelerators: H200:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    - accelerators: H200:8
      cloud: runpod
    - accelerators: H200:8
      cloud: lambda
    - accelerators: H200:8
      cloud: nebius
    - accelerators: H200-SXM:8
      cloud: vast

num_nodes: 1

workdir: /Users/fleet-wt-6/SkyRL

envs:
  WANDB_API_KEY: ""
  FLEET_API_KEY: ""
  OPENROUTER_API_KEY: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"
  S3_DATASET_BUCKET: "fleet-internal-datasets"
  S3_CHECKPOINT_BUCKET: "skyrl-checkpoints"
  S3_TRAJECTORY_BUCKET: "skyrl-trajectories"
  DATA_VERSION: "v6"
  # fleet-common-setup.sh requires tool_use|computer_use|browser_use at setup time;
  # the DAPO launcher overrides MODALITY=aime at run time via the launcher script.
  MODALITY: "tool_use"
  LOGGER: "wandb"
  INFERENCE_BACKEND: "vllm"
  NUM_STEPS: "200"
  TRAIN_BATCH_SIZE: "32"
  N_SAMPLES: "8"
  CKPT_INTERVAL: "20"
  HF_SAVE_INTERVAL: "50"
  MAX_CKPTS_TO_KEEP: "10"
  MAX_GENERATE_LENGTH: "8192"
  SEED: "42"
  STATUS_DIR: "/tmp/exp2-bug-status"

setup: |
  bash scripts/fleet-common-setup.sh \
    --openenv-branch deniz/fleet_client \
    --extra-setup scripts/fleet-qwen35-extra-setup.sh

run: |
  bash scripts/run-exp2-all-arms.sh
